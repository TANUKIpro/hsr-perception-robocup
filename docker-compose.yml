# HSR Perception Pipeline - Docker Compose
#
# The base image now bundles ROS2 Humble + OpenNI2 + PyQt6, so Xtion live
# inference shares the same container as training / Streamlit.
#
# Usage:
#   docker compose up                                  # Streamlit UI
#   docker compose --profile tensorboard up            # Include TensorBoard
#   docker compose run --rm app bash                   # Interactive shell
#   docker compose run --rm app train --dataset ...    # One-shot training
#   docker compose run --rm app xtion-live --model ... # Live inference (needs X11 + Xtion on host)
#

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: hsr-perception:latest
    container_name: hsr-perception

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Host network for ROS2 DDS discovery to reach publishers outside the
    # container (e.g. the openni2_camera node on the host).
    network_mode: host

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTHONUNBUFFERED=1
      - PYBULLET_HSR_ROOT=/pybullet_hsr
      # ROS2
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTRTPS_DEFAULT_PROFILES_FILE=/workspace/config/fastdds_profile.xml
      # X11 for Qt GUI (xtion-live)
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=${XAUTHORITY:-/tmp/.docker.xauth}

    volumes:
      - ${DATASETS_DIR:-./datasets}:/workspace/datasets
      - ${MODELS_DIR:-./models}:/workspace/models
      - ${RUNS_DIR:-./runs}:/workspace/runs
      - ${APP_DATA_DIR:-./app_data}:/workspace/app_data
      - ./config:/workspace/config:ro
      # pybullet_hsr source dataset, read-only
      - ${PYBULLET_HSR_ROOT:-/home/roboworks/repos/pybullet_hsr}:/pybullet_hsr:ro
      # USB passthrough for Xtion PRO LIVE
      - /dev/bus/usb:/dev/bus/usb
      # X11 socket for GUI apps (xtion-live)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/dev/null}:${XAUTHORITY:-/tmp/.docker.xauth}:rw
      - /dev/shm:/dev/shm

    devices:
      - /dev/bus/usb:/dev/bus/usb

    # Needed for direct USB access to the Xtion sensor.
    privileged: true

    stdin_open: true
    tty: true
    shm_size: '8gb'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    command: streamlit

  tensorboard:
    image: hsr-perception:latest
    container_name: hsr-tensorboard
    network_mode: host
    volumes:
      - ${RUNS_DIR:-./runs}:/workspace/runs:ro
    command: tensorboard
    profiles:
      - tensorboard
    depends_on:
      - app
